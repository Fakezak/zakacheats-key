<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaka Key | Premium Code Generator</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #0a0d14;
            --card-bg: #121824;
            --border-color: #1e293b;
            --accent-glow: rgba(255, 0, 85, 0.5);
            --primary-gradient: linear-gradient(135deg, #ff0055, #9d00ff);
            --secondary-gradient: linear-gradient(135deg, #00f2fe, #4facfe);
            --text-main: #ffffff;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--primary-gradient);
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
        }
        body::before { top: 10%; left: 10%; }
        body::after { bottom: 10%; right: 10%; }

        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 24, 36, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        .generator-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .generator-card h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Progress Bar Styling */
        .progress-container {
            width: 100%;
            background: #090d14;
            height: 8px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--secondary-gradient);
            box-shadow: 0 0 10px #00f2fe;
            transition: width 0.4s ease;
        }

        .step-text {
            color: #00f2fe;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .instruction-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 25px;
            min-height: 40px;
        }

        /* Code Box */
        .code-display-box {
            background: #090d14;
            border: 2px dashed #2e3d52;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #2e3d52;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .code-display-box.unlocked {
            color: #10b981;
            border-color: #10b981;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* Buttons */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-main {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-main:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 85, 0.7);
        }

        button:disabled {
            background: #1e293b;
            color: var(--text-muted);
            border: 1px solid #334155;
            box-shadow: none;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-copy {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
        }

        .btn-copy.copied {
            background: #10b981 !important;
            border-color: #10b981 !important;
        }

        footer {
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid var(--border-color);
            background: rgba(10, 13, 20, 0.9);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Zaka Key</div>
    </header>

    <main>
        <div class="generator-card">
            <h2>Key Verification System</h2>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="step-text" id="stepTracker">Step 1 of 5</div>
            <div class="instruction-text" id="instructionLabel">Click "Visit Sponsor Ad" below to start verification.</div>
            
            <div class="code-display-box" id="codeDisplay">LOCKED</div>
            
            <div class="btn-container">
                <button class="btn-main" id="actionButton" onclick="handleAction()">Visit Sponsor Ad</button>
                <button class="btn-copy" id="copyButton" onclick="copyKey()" disabled>Copy Key</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Zaka Key. Designed for premium speed and execution.</p>
    </footer>

    <script>
        let currentStep = 1;
        const totalSteps = 5;
        let hasClickedAd = false;
        let countdownTimer;

        // Array of random placeholder ad links (replace these with your actual shortener/ad URLs)
        const adLinks = [
            "https://example.com/ad-sponsor-1",
            "https://example.com/ad-sponsor-2",
            "https://example.com/ad-sponsor-3",
            "https://example.com/ad-sponsor-4",
            "https://example.com/ad-sponsor-5"
        ];

        function handleAction() {
            const btn = document.getElementById('actionButton');
            const instruction = document.getElementById('instructionLabel');

            if (!hasClickedAd) {
                // Step Action Part 1: User needs to open the ad link
                const randomAdUrl = adLinks[Math.floor(Math.random() * adLinks.length)];
                window.open(randomAdUrl, '_blank');
                
                hasClickedAd = true;
                btn.disabled = true;
                
                // Start a 5-second countdown to simulate checking if they visited the page
                let timeLeft = 5;
                btn.textContent = `Verify Time: ${timeLeft}s`;
                instruction.textContent = "Please view the sponsor page completely, then return here.";

                countdownTimer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(countdownTimer);
                        btn.disabled = false;
                        btn.textContent = "Continue";
                        instruction.textContent = "Link verified! Click Continue to proceed.";
                    } else {
                        btn.textContent = `Verify Time: ${timeLeft}s`;
                    }
                }, 1000);

            } else {
                // Step Action Part 2: User clicked continue after the timer finished
                hasClickedAd = false;
                currentStep++;
                
                updateUI();
            }
        }

        function updateUI() {
            const progressBar = document.getElementById('progressBar');
            const stepTracker = document.getElementById('stepTracker');
            const instruction = document.getElementById('instructionLabel');
            const btn = document.getElementById('actionButton');

            // Calculate percentage for visual progress bar
            const progressPercent = ((currentStep - 1) / totalSteps) * 100;
            progressBar.style.width = `${progressPercent}%`;

            if (currentStep <= totalSteps) {
                stepTracker.textContent = `Step ${currentStep} of ${totalSteps}`;
                btn.textContent = "Visit Sponsor Ad";
                instruction.textContent = "Click the button to open the next sponsor link.";
            } else {
                // All 5 steps completed successfully
                progressBar.style.width = "100%";
                stepTracker.textContent = "Verification Complete!";
                stepTracker.style.color = "#10b981";
                instruction.textContent = "Your destination key has been unlocked successfully.";
                
                // Generate and showcase the final key
                generateKey();
            }
        }

        function generateKey() {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let randomSequence = '';
            
            for (let i = 0; i < 8; i++) {
                const randomIndex = Math.floor(Math.random() * characters.length);
                randomSequence += characters.charAt(randomIndex);
            }
            
            const finalKey = `GRC-${randomSequence}`;
            const displayEl = document.getElementById('codeDisplay');
            const copyBtnEl = document.getElementById('copyButton');
            const mainBtn = document.getElementById('actionButton');

            displayEl.textContent = finalKey;
            displayEl.classList.add('unlocked');
            
            copyBtnEl.disabled = false;
            mainBtn.disabled = true;
            mainBtn.textContent = "Unlocked";
            mainBtn.style.background = "#10b981";
        }

        function copyKey() {
            const displayEl = document.getElementById('codeDisplay');
            const copyBtnEl = document.getElementById('copyButton');
            
            if (displayEl.textContent === 'LOCKED') return;
            
            navigator.clipboard.writeText(displayEl.textContent).then(() => {
                copyBtnEl.textContent = "Copied!";
                copyBtnEl.classList.add('copied');
                
                setTimeout(() => {
                    copyBtnEl.textContent = "Copy Key";
                    copyBtnEl.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
