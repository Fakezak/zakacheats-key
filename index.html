<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zaka Key | Secure Code Vault</title>
    <style>
        /* Base Reset & Futuristic UI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }

        :root {
            --bg-deep: #05070c;
            --card-surface: #0e121f;
            --border-glow: rgba(0, 242, 254, 0.2);
            --accent-cyan: #00f2fe;
            --accent-magenta: #ff0055;
            --grad-primary: linear-gradient(135deg, #ff0055, #9d00ff);
            --grad-secondary: linear-gradient(135deg, #00f2fe, #4facfe);
            --text-main: #f1f5f9;
            --text-dim: #8a99b4;
            --danger-glow: rgba(255, 40, 80, 0.7);
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 1rem;
        }

        /* Animated background orbs */
        .orb {
            position: fixed;
            width: 40vw;
            height: 40vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,85,0.2), transparent 70%);
            filter: blur(70px);
            z-index: -2;
            animation: float 20s infinite alternate;
        }
        .orb1 { top: -20%; left: -20%; background: radial-gradient(circle, rgba(0,242,254,0.2), transparent); }
        .orb2 { bottom: -20%; right: -20%; background: radial-gradient(circle, rgba(255,0,85,0.2), transparent); animation-duration: 25s; }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        header {
            width: 100%;
            max-width: 680px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            padding: 0.8rem 2rem;
            background: rgba(8, 12, 20, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: var(--grad-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(255,0,85,0.4);
        }

        .security-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 0.8rem 1.5rem;
            margin-bottom: 1.4rem;
            width: 100%;
            max-width: 520px;
            border-left: 3px solid var(--accent-cyan);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .shield-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .badge {
            background: #1e2a3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-safe { background: #10b98120; color: #10b981; border: 1px solid #10b981; }
        .badge-danger { background: #ff005520; color: #ff3366; border: 1px solid #ff3366; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 0.7; text-shadow: 0 0 0px red; }
            100% { opacity: 1; text-shadow: 0 0 4px #ff0055; }
        }

        main {
            width: 100%;
            max-width: 520px;
        }

        .generator-card {
            background: rgba(14, 18, 31, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glow);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
            transition: all 0.2s;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(120deg, #fff, #a5f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .progress-container {
            background: #03060c;
            height: 10px;
            border-radius: 20px;
            margin: 20px 0 12px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--grad-secondary);
            box-shadow: 0 0 8px #00f2fe;
            transition: width 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .step-text {
            color: var(--accent-cyan);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-top: 8px;
        }
        .instruction-text {
            color: var(--text-dim);
            margin: 12px 0 18px;
            font-size: 0.9rem;
            background: #00000030;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .code-display-box {
            background: #010101;
            border: 1px solid #2a3a55;
            border-radius: 20px;
            padding: 1.2rem;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-align: center;
            color: #4b5a75;
            margin: 20px 0;
            transition: all 0.2s;
        }
        .code-display-box.unlocked {
            color: #10b981;
            border-color: #10b981;
            text-shadow: 0 0 8px #10b98160;
            background: #0a1918;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-main {
            background: var(--grad-primary);
            color: white;
            box-shadow: 0 6px 16px rgba(255, 0, 85, 0.3);
        }
        .btn-main:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 10px 22px rgba(255, 0, 85, 0.5);
        }
        .btn-copy {
            background: #1e2a3e;
            color: #cbd5e6;
            border: 1px solid #2d3e5a;
        }
        .btn-copy:enabled:hover {
            background: #2d3e5a;
            color: white;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.1);
        }
        .warning-message {
            background: #ff336610;
            border-left: 4px solid #ff3366;
            padding: 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            margin-top: 18px;
            color: #ff98b3;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #4b5b79;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
    <div class="logo">⚡ ZAKA KEY ⚡</div>
</header>

<div class="security-panel" id="securityPanel">
    <div class="shield-status">🛡️ SECURITY SCAN</div>
    <div id="securityBadge" class="badge">checking...</div>
</div>

<main>
    <div class="generator-card">
        <h2>🔐 Premium Unlock</h2>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="step-text" id="stepTracker">Step 1 of 5</div>
        <div class="instruction-text" id="instructionLabel">🔒 Security check in progress... Please wait.</div>

        <div class="code-display-box" id="codeDisplay">••••••••</div>

        <div class="btn-container">
            <button class="btn-main" id="actionButton" disabled>⏳ Verifying Environment</button>
            <button class="btn-copy" id="copyButton" disabled>📋 Copy Key</button>
        </div>
        <div id="globalWarning" class="warning-message" style="display: none;"></div>
    </div>
</main>
<footer>
    <p>🔍 Real sponsor ads • Anti-Adblock & VPN Protection • Random premium offers</p>
</footer>

<script>
    // ---------- CONFIG ----------
    const TOTAL_STEPS = 5;
    let currentStep = 1;
    let waitingForAd = false;
    let countdownTimer = null;
    let securityClear = false;          // global flag: true = no adblock/vpn, proceed
    let securityChecked = false;
    
    // ---------- REAL AD WEBSITES (GENUINE, RANDOM, REAL SPONSORS) ----------
    const REAL_AD_SITES = [
        "https://www.bestbuy.com/",
        "https://www.target.com/",
        "https://www.newegg.com/",
        "https://www.walmart.com/",
        "https://www.ebay.com/",
        "https://www.aliexpress.com/",
        "https://www.etsy.com/",
        "https://www.zalando.com/",
        "https://www.rakuten.com/",
        "https://www.costco.com/",
        "https://www.adidas.com/us",
        "https://www.nike.com/",
        "https://www.samsung.com/us/",
        "https://www.dell.com/",
        "https://www.booking.com/",
        "https://www.expedia.com/"
    ];
    
    // Helper: pick a random real website (sponsor ad)
    function getRandomAdUrl() {
        return REAL_AD_SITES[Math.floor(Math.random() * REAL_AD_SITES.length)];
    }
    
    // ---------- ADVANCED DETECTION: AdBlocker + VPN / DNS BLOCKING ----------
    // Method: 1) fetch known ad script (Google AdSense / DoubleClick) 2) custom element injection
    // 3) VPN detection via ipapi.co (proxy, hosting, vpn flags)
    // 4) DNS blocking detection: if ad domain fetch is blocked -> considered adblock
    
    let detectionDetails = "";
    
    async function detectAdblockAndVPN() {
        // reset UI
        const badge = document.getElementById('securityBadge');
        const actionBtn = document.getElementById('actionButton');
        const warningDiv = document.getElementById('globalWarning');
        
        badge.textContent = "⏳ scanning...";
        badge.className = "badge";
        
        let adBlockDetected = false;
        let vpnDetected = false;
        
        // ---- TEST 1: Classic ad script fetch (Google Ad Manager endpoint) ----
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const fetchTest = await fetch('https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js', {
                method: 'HEAD',
                mode: 'no-cors',     // no-cors still fails if blocked by network/adblock
                signal: controller.signal
            }).catch(err => { throw err; });
            clearTimeout(timeoutId);
            // If we get any response (even opaque) it's probably not blocked by adblock.
            // But some adblockers may block connection entirely → fetch will throw TypeError
        } catch (err) {
            console.warn("AdScript fetch error:", err);
            if (err.name === 'TypeError' || err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                adBlockDetected = true;
                detectionDetails = "Ad script (adsbygoogle) blocked → AdBlocker or DNS filtering active.";
            }
        }
        
        // ---- TEST 2: DOM based adblock detection (inject known blocked class) ----
        const testDiv = document.createElement('div');
        testDiv.className = 'adsbox ad-banner advertisement';
        testDiv.style.cssText = 'width: 1px; height: 1px; position: absolute; top: -999px;';
        document.body.appendChild(testDiv);
        const isHidden = (testDiv.offsetHeight === 0 && testDiv.offsetWidth === 0) || 
                         getComputedStyle(testDiv).display === 'none';
        if (isHidden) {
            adBlockDetected = true;
            detectionDetails += " DOM ad element hidden → Adblocker active.";
        }
        document.body.removeChild(testDiv);
        
        // ---- TEST 3: VPN / Proxy detection via ipapi.co (real VPN detection) ----
        try {
            const vpnController = new AbortController();
            const vpnTimeout = setTimeout(() => vpnController.abort(), 4000);
            const response = await fetch('https://ipapi.co/json/', {
                signal: vpnController.signal,
                headers: { 'Accept': 'application/json' }
            });
            clearTimeout(vpnTimeout);
            if (response.ok) {
                const data = await response.json();
                // ipapi returns fields: proxy (bool), tor (bool), vpn (bool sometimes) 
                if (data.proxy === true || data.tor === true || data.vpn === true) {
                    vpnDetected = true;
                    detectionDetails += " VPN/Proxy/Tor detected via IP analysis.";
                }
                // Additional: check if 'org' contains known vpn providers (optional)
                if (data.org && (data.org.toLowerCase().includes('vpn') || data.org.toLowerCase().includes('proxy'))) {
                    vpnDetected = true;
                }
            }
        } catch (err) {
            console.warn("VPN detection failed or rate-limited:", err);
            // if vpn detection fails, not critical, but we log as potential, but not mark as vpn
        }
        
        // ---- TEST 4: DNS based blocking simulation - fetch random known ad domain ----
        try {
            const dnsTest = await fetch('https://securepubads.g.doubleclick.net/tag/js/gpt.js', {
                method: 'HEAD',
                mode: 'no-cors'
            }).catch(e => { throw e; });
        } catch (dnsErr) {
            // if this fails, adblock/dns is likely filtering
            if (!adBlockDetected) adBlockDetected = true;
            detectionDetails += " Doubleclick fetch blocked → DNS/ad-filter.";
        }
        
        // final decision: securityClear = true only if NO adblock AND NO vpn
        const threatDetected = adBlockDetected || vpnDetected;
        
        if (threatDetected) {
            securityClear = false;
            const warnMsg = document.getElementById('globalWarning');
            warnMsg.style.display = 'block';
            warnMsg.innerHTML = `⚠️ SECURITY ALERT: ${detectionDetails || "AdBlocker / VPN / DNS filtering detected."}<br>🔒 For security and key verification, please disable AdBlockers, VPNs, or proxies and refresh the page.`;
            badge.textContent = "🚫 BLOCKED (AdBlock/VPN)";
            badge.className = "badge badge-danger";
            actionBtn.disabled = true;
            actionBtn.textContent = "⛔ Access Denied";
            document.getElementById('copyButton').disabled = true;
            document.getElementById('instructionLabel').innerHTML = "❌ Adblocker or VPN detected. Disable them to generate premium key.";
            return false;
        } else {
            securityClear = true;
            badge.textContent = "✅ SECURE • NO ADBLOCK/VPN";
            badge.className = "badge badge-safe";
            document.getElementById('globalWarning').style.display = 'none';
            actionBtn.disabled = false;
            actionBtn.textContent = "🌐 Visit Sponsor Ad";
            document.getElementById('instructionLabel').innerHTML = "Click 'Visit Sponsor Ad' to view random real sponsor offer & unlock progress.";
            return true;
        }
    }
    
    // ---------- CORE LOGIC: STEP HANDLER & UI ----------
    const progressBar = document.getElementById('progressBar');
    const stepTracker = document.getElementById('stepTracker');
    const instructionLabel = document.getElementById('instructionLabel');
    const actionButton = document.getElementById('actionButton');
    const copyButton = document.getElementById('copyButton');
    const codeDisplay = document.getElementById('codeDisplay');
    
    function updateStepUI() {
        const percent = ((currentStep - 1) / TOTAL_STEPS) * 100;
        progressBar.style.width = `${percent}%`;
        if (currentStep <= TOTAL_STEPS) {
            stepTracker.textContent = `Step ${currentStep} of ${TOTAL_STEPS}`;
            instructionLabel.innerHTML = `📢 Step ${currentStep}: Click below to open a REAL sponsor website. Complete verification to continue.`;
            actionButton.disabled = false;
            if (securityClear) actionButton.textContent = "🌐 Visit Sponsor Ad";
            else actionButton.textContent = "⛔ Blocked";
        } else {
            // Completed all steps
            progressBar.style.width = "100%";
            stepTracker.textContent = "✅ ACCESS GRANTED";
            stepTracker.style.color = "#10b981";
            instructionLabel.innerHTML = "✨ Verification complete! Your exclusive premium key is ready.";
            generateUnlockKey();
        }
    }
    
    // final key generation
    function generateUnlockKey() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
        let segment1 = '', segment2 = '';
        for (let i = 0; i < 4; i++) segment1 += chars[Math.floor(Math.random() * chars.length)];
        for (let i = 0; i < 6; i++) segment2 += chars[Math.floor(Math.random() * chars.length)];
        const finalCode = `ZKA-${segment1}-${segment2}`;
        codeDisplay.textContent = finalCode;
        codeDisplay.classList.add('unlocked');
        copyButton.disabled = false;
        actionButton.disabled = true;
        actionButton.textContent = "🔓 UNLOCKED";
        actionButton.style.background = "#10b981";
        instructionLabel.innerHTML = "🎉 Key generated! Copy and redeem your premium access.";
    }
    
    function copyKey() {
        if (codeDisplay.textContent === '••••••••' || codeDisplay.textContent === 'LOCKED') return;
        navigator.clipboard.writeText(codeDisplay.textContent).then(() => {
            copyButton.textContent = "✓ Copied!";
            copyButton.classList.add('copied');
            setTimeout(() => {
                copyButton.textContent = "📋 Copy Key";
                copyButton.classList.remove('copied');
            }, 2000);
        }).catch(() => {
            alert("Manual copy: " + codeDisplay.textContent);
        });
    }
    
    // action for each step: open real random ad website, then simulate verification timer
    function handleAction() {
        // Block if security not cleared
        if (!securityClear) {
            instructionLabel.innerHTML = "⛔ Security violation (AdBlock/VPN). Please disable protections and refresh.";
            return;
        }
        
        // if generator already completed (step > total) ignore
        if (currentStep > TOTAL_STEPS) return;
        
        // if waiting for ad verification, don't allow multiple clicks
        if (waitingForAd) return;
        
        // open real random ad website (genuine real offer website)
        const randomUrl = getRandomAdUrl();
        window.open(randomUrl, '_blank', 'noopener,noreferrer');
        
        // disable action button temporarily, start countdown simulation (like confirming ad view)
        waitingForAd = true;
        actionButton.disabled = true;
        let timeLeft = 5;
        actionButton.textContent = `⏳ Verify (${timeLeft}s) - Stay on page`;
        instructionLabel.innerHTML = `✅ Ad opened: ${randomUrl.replace('https://', '')}<br>⏱️ Wait ${timeLeft} seconds, then continue. (Adblock check passed)`;
        
        if (countdownTimer) clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdownTimer);
                countdownTimer = null;
                waitingForAd = false;
                // Move to next step
                currentStep++;
                updateStepUI();
                // re-enable action button only if not finished
                if (currentStep <= TOTAL_STEPS) {
                    actionButton.disabled = false;
                    if (securityClear) actionButton.textContent = "🌐 Visit Sponsor Ad";
                } else {
                    actionButton.disabled = true;
                }
                instructionLabel.innerHTML = (currentStep <= TOTAL_STEPS) 
                    ? `Step ${currentStep} ready. Click next sponsor ad to continue.` 
                    : "Verification completed! Your key appears below.";
            } else {
                actionButton.textContent = `⏳ Verify (${timeLeft}s)`;
            }
        }, 1000);
    }
    
    // reset if needed but we keep detection once
    async function initSecurityAndApp() {
        // disable button during security checks
        actionButton.disabled = true;
        actionButton.textContent = "🔍 Security Scan...";
        instructionLabel.innerHTML = "🔒 Running deep security scan: AdBlock, VPN, DNS filters...";
        
        const isClean = await detectAdblockAndVPN();
        if (isClean) {
            securityClear = true;
            currentStep = 1;
            waitingForAd = false;
            updateStepUI();
            // attach event listener safely
            actionButton.onclick = handleAction;
            copyButton.onclick = copyKey;
            instructionLabel.innerHTML = "✅ Security passed. Click 'Visit Sponsor Ad' to open a real sponsor website and unlock step by step.";
        } else {
            securityClear = false;
            actionButton.disabled = true;
            actionButton.onclick = null;
            copyButton.onclick = null;
            instructionLabel.innerHTML = "⚠️ SECURITY ALERT: AdBlock, VPN, or DNS proxy detected. Please disable all blocking tools & refresh.";
        }
    }
    
    // ---- additional re-check on visibility? but only once on load ----
    window.addEventListener('load', () => {
        initSecurityAndApp();
        // optional: backup ad blocker re-check if user tries to cheat? but main detection is enough
        // also ensure copy button pre-disabled
        copyButton.disabled = true;
        codeDisplay.textContent = "🔒 LOCKED";
        codeDisplay.classList.remove('unlocked');
    });
    
    // Extra style for copied effect 
    const styleCopied = document.createElement('style');
    styleCopied.textContent = `.btn-copy.copied { background: #10b981 !important; color: white !important; border-color: #10b981 !important; }`;
    document.head.appendChild(styleCopied);
    
    // Refresh warning if any future event but core already functional.
    // also prevent VPN evasion by making sure ip detection runs once, but secure.
</script>
</body>
</html>
