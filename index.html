<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaka Key | Premium Code Generator</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-color: #0a0d14;
            --card-bg: #121824;
            --border-color: #1e293b;
            --accent-glow: rgba(255, 0, 85, 0.5);
            --primary-gradient: linear-gradient(135deg, #ff0055, #9d00ff);
            --secondary-gradient: linear-gradient(135deg, #00f2fe, #4facfe);
            --text-main: #ffffff;
            --text-muted: #64748b;
        }

        /* Body Styling */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Decorative Background Glows */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--primary-gradient);
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
        }
        body::before { top: 10%; left: 10%; }
        body::after { bottom: 10%; right: 10%; }

        /* Navigation / Header */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 24, 36, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        /* Main Container */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        /* Generator Card (Tricksensi Style) */
        .generator-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .generator-card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 24px;
            background: var(--primary-gradient);
            z-index: -1;
            opacity: 0.15;
            transition: opacity 0.3s ease;
        }

        .generator-card:hover::before {
            opacity: 0.3;
        }

        .generator-card h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .generator-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Code Display Area */
        .code-display-box {
            background: #090d14;
            border: 2px dashed #2e3d52;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text-muted);
            margin-bottom: 30px;
            transition: all 0.3s ease;
            user-select: none;
        }

        .code-display-box.active {
            color: #00f2fe;
            border-color: #00f2fe;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            animation: popIn 0.3s ease-out;
        }

        /* Action Buttons */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 85, 0.7);
        }

        .btn-generate:active {
            transform: translateY(1px);
        }

        .btn-copy {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
        }

        .btn-copy:hover:not(:disabled) {
            background: #334155;
            color: #ffffff;
        }

        .btn-copy:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-copy.copied {
            background: #10b981 !important;
            border-color: #10b981 !important;
            color: white !important;
        }

        /* Footer */
        footer {
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid var(--border-color);
            background: rgba(10, 13, 20, 0.9);
        }

        /* Keyframe Animations */
        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Zaka Key</div>
    </header>

    <main>
        <div class="generator-card">
            <h2>Key Generator</h2>
            <p>Click the button below to generate your random secure key.</p>
            
            <div class="code-display-box" id="codeDisplay">GRC-XXXXXXXX</div>
            
            <div class="btn-container">
                <button class="btn-generate" onclick="generateKey()">Generate Key</button>
                <button class="btn-copy" id="copyButton" onclick="copyKey()" disabled>Copy Key</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Zaka Key. Designed for premium speed and execution.</p>
    </footer>

    <script>
        function generateKey() {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let randomSequence = '';
            
            // Loop exactly 8 times to produce 8 random uppercase letters
            for (let i = 0; i < 8; i++) {
                const randomIndex = Math.floor(Math.random() * characters.length);
                randomSequence += characters.charAt(randomIndex);
            }
            
            // Format the code output
            const finalKey = `GRC-${randomSequence}`;
            
            // Update UI elements
            const displayEl = document.getElementById('codeDisplay');
            const copyBtnEl = document.getElementById('copyButton');
            
            displayEl.textContent = finalKey;
            displayEl.classList.add('active');
            
            // Enable copy button functionality
            copyBtnEl.disabled = false;
            copyBtnEl.textContent = "Copy Key";
            copyBtnEl.classList.remove('copied');
        }

        function copyKey() {
            const displayEl = document.getElementById('codeDisplay');
            const copyBtnEl = document.getElementById('copyButton');
            const keyText = displayEl.textContent;
            
            // Guard clause to ensure dummy placeholders aren't copied
            if (keyText === 'GRC-XXXXXXXX') return;
            
            // Modern Clipboard API execution
            navigator.clipboard.writeText(keyText).then(() => {
                copyBtnEl.textContent = "Copied!";
                copyBtnEl.classList.add('copied');
                
                // Revert button state after 2 seconds
                setTimeout(() => {
                    if (displayEl.textContent === keyText) {
                        copyBtnEl.textContent = "Copy Key";
                        copyBtnEl.classList.remove('copied');
                    }
                }, 2000);
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        }
    </script>
</body>
</html>
